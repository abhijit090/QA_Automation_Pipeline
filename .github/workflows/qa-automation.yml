# ============================================================
# AI-Powered QA Automation — GitHub Actions CI/CD Pipeline
# ============================================================
#
# REQUIRED GITHUB SECRETS (Repo → Settings → Secrets → Actions):
#   TEST_BASE_URL       — e.g. https://development.d36z6oo50ky8dh.amplifyapp.com/login
#   TEST_USERNAME       — e.g. testd1051@gmail.com
#   TEST_PASSWORD       — Login password
#
# OPTIONAL SECRETS:
#   ANTHROPIC_API_KEY   — Claude AI key
#   JIRA_BASE_URL / JIRA_USERNAME / JIRA_API_TOKEN / JIRA_PROJECT_KEY / JIRA_BOARD_ID
# ============================================================

name: QA Automation Pipeline

on:
  push:
    branches: [ main, master ]
    paths:
      - 'tests/generated/**.robot'
      - 'tests/resources/**.robot'
      - 'backend/**'
      - 'requirements.txt'
      - '.github/workflows/qa-automation.yml'

  pull_request:
    branches: [ main, master ]

  workflow_dispatch:
    inputs:
      test_script:
        description: 'Robot script or folder to run'
        required: false
        default: 'tests/generated/test_login_template.robot'
      base_url:
        description: 'App URL (leave blank to use TEST_BASE_URL secret)'
        required: false
        default: ''
      username:
        description: 'Login username (leave blank to use TEST_USERNAME secret)'
        required: false
        default: ''
      password:
        description: 'Login password (leave blank to use TEST_PASSWORD secret)'
        required: false
        default: ''
      headless:
        description: 'Headless browser?'
        required: false
        default: 'true'
      browser:
        description: 'Browser (Chrome / Firefox / Edge)'
        required: false
        default: 'Chrome'

concurrency:
  group: qa-${{ github.ref }}
  cancel-in-progress: true

env:
  # Defaults used when secrets are not set
  DEFAULT_BASE_URL: 'https://development.d36z6oo50ky8dh.amplifyapp.com/login'
  DEFAULT_BROWSER: 'Chrome'
  DEFAULT_SCRIPT: 'tests/generated/test_login_template.robot'

jobs:
  qa-automation:
    name: QA Automation Tests
    runs-on: ubuntu-latest

    permissions:
      contents: write
      checks: write
      pull-requests: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Chrome (stable)
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install matching ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Start virtual display (Xvfb)
        run: |
          sudo apt-get install -y xvfb
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Prepare report directories
        run: |
          mkdir -p reports/allure-results
          mkdir -p reports/allure-report
          mkdir -p reports/output
          mkdir -p reports/screenshots

      - name: Write .env file
        run: |
          cat > .env <<EOF
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          AI_MODEL=claude-sonnet-4-6
          JIRA_BASE_URL=${{ secrets.JIRA_BASE_URL }}
          JIRA_USERNAME=${{ secrets.JIRA_USERNAME }}
          JIRA_API_TOKEN=${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY=${{ secrets.JIRA_PROJECT_KEY }}
          JIRA_BOARD_ID=${{ secrets.JIRA_BOARD_ID }}
          EOF

      # ── Resolve all variables with proper fallback chain ──
      - name: Resolve test variables
        id: vars
        run: |
          # Script: manual input → default
          SCRIPT="${{ github.event.inputs.test_script }}"
          SCRIPT="${SCRIPT:-${{ env.DEFAULT_SCRIPT }}}"

          # URL: manual input → secret → default
          URL="${{ github.event.inputs.base_url }}"
          URL="${URL:-${{ secrets.TEST_BASE_URL }}}"
          URL="${URL:-${{ env.DEFAULT_BASE_URL }}}"

          # Username: manual input → secret → empty (will skip login)
          USER="${{ github.event.inputs.username }}"
          USER="${USER:-${{ secrets.TEST_USERNAME }}}"

          # Password: manual input → secret → empty
          PASS="${{ github.event.inputs.password }}"
          PASS="${PASS:-${{ secrets.TEST_PASSWORD }}}"

          # Browser & headless
          BROWSER="${{ github.event.inputs.browser }}"
          BROWSER="${BROWSER:-${{ env.DEFAULT_BROWSER }}}"

          HEADLESS="${{ github.event.inputs.headless }}"
          HEADLESS="${HEADLESS:-true}"

          # Export for next steps
          echo "SCRIPT=${SCRIPT}" >> $GITHUB_OUTPUT
          echo "URL=${URL}" >> $GITHUB_OUTPUT
          echo "USER=${USER}" >> $GITHUB_OUTPUT
          echo "PASS=${PASS}" >> $GITHUB_OUTPUT
          echo "BROWSER=${BROWSER}" >> $GITHUB_OUTPUT
          echo "HEADLESS=${HEADLESS}" >> $GITHUB_OUTPUT

          echo "=================================================="
          echo " Script  : ${SCRIPT}"
          echo " URL     : ${URL}"
          echo " Username: ${USER:+(set)}"
          echo " Password: ${PASS:+(set)}"
          echo " Headless: ${HEADLESS}"
          echo " Browser : ${BROWSER}"
          echo "=================================================="

          # Validate: script file/folder must exist
          if [ ! -e "${SCRIPT}" ]; then
            echo "ERROR: Script path '${SCRIPT}' does not exist!"
            echo "Available .robot files:"
            find tests/generated -name "*.robot" -type f 2>/dev/null || echo "  (none)"
            exit 1
          fi

          # Validate: URL must not be empty
          if [ -z "${URL}" ]; then
            echo "ERROR: No BASE_URL provided. Set TEST_BASE_URL secret or pass base_url input."
            exit 1
          fi

      - name: Run Robot Framework tests
        id: robot_run
        run: |
          ROBOT_ARGS=(
            --outputdir  reports/output
            --output     output.xml
            --log        log.html
            --report     report.html
            --loglevel   INFO
            --listener   "allure_robotframework;reports/allure-results"
            --variable   "BASE_URL:${{ steps.vars.outputs.URL }}"
            --variable   "BROWSER:${{ steps.vars.outputs.BROWSER }}"
            --variable   "SCREENSHOT_DIR:reports/screenshots"
          )

          # Only add credentials if they are set
          if [ -n "${{ steps.vars.outputs.USER }}" ]; then
            ROBOT_ARGS+=(--variable "USERNAME:${{ steps.vars.outputs.USER }}")
          fi
          if [ -n "${{ steps.vars.outputs.PASS }}" ]; then
            ROBOT_ARGS+=(--variable "PASSWORD:${{ steps.vars.outputs.PASS }}")
          fi

          # Add headless Chrome options if headless=true
          if [ "${{ steps.vars.outputs.HEADLESS }}" = "true" ]; then
            ROBOT_ARGS+=(--variable "HEADLESS:true")
          fi

          echo "Running: python -m robot ${ROBOT_ARGS[*]} ${{ steps.vars.outputs.SCRIPT }}"

          python -m robot "${ROBOT_ARGS[@]}" "${{ steps.vars.outputs.SCRIPT }}"
        continue-on-error: true

      - name: Generate Allure report
        if: always()
        run: |
          if [ -d "reports/allure-results" ] && [ "$(ls -A reports/allure-results 2>/dev/null)" ]; then
            allure generate reports/allure-results --output reports/allure-report --clean
            echo "Allure report generated."
          else
            echo "No allure-results to generate report from."
          fi

      - name: Print test summary
        if: always()
        run: |
          echo "====== TEST SUMMARY ======"
          python3 - <<'PYEOF'
          import xml.etree.ElementTree as ET, os, glob
          xmls = glob.glob("reports/output/**/output.xml", recursive=True)
          if not xmls:
              xmls = glob.glob("reports/output/output.xml")
          if not xmls:
              print("No output.xml found.")
          else:
              total_pass = 0
              total_fail = 0
              for xml in xmls:
                  root = ET.parse(xml).getroot()
                  for t in root.iter("test"):
                      s = t.find("status")
                      status = s.get("status", "") if s is not None else ""
                      name = t.get("name", "")
                      icon = "✅" if status == "PASS" else "❌"
                      print(f"  {icon} {status:4s} | {name}")
                      if status == "PASS": total_pass += 1
                      else: total_fail += 1
              print(f"\n  Total: {total_pass + total_fail} | Passed: {total_pass} | Failed: {total_fail}")
              if total_fail > 0:
                  print(f"  ❌ {total_fail} test(s) FAILED")
              else:
                  print(f"  ✅ All {total_pass} tests PASSED")
          PYEOF

      - name: Upload Allure Report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report-run-${{ github.run_number }}
          path: reports/allure-report/
          retention-days: 30

      - name: Upload Robot Framework outputs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rf-output-run-${{ github.run_number }}
          path: |
            reports/output/
            reports/screenshots/
          retention-days: 14

      # ── Publish Allure Report to GitHub Pages ──────────────
      - name: Deploy Allure Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./reports/allure-report
          destination_dir: allure-report/${{ github.run_number }}
          keep_files: true

      - name: Print Allure Report URL
        if: always()
        run: |
          echo "============================================="
          echo "📊 ALLURE REPORT PUBLISHED!"
          echo "============================================="
          echo ""
          echo "🔗 Open in browser:"
          echo "   https://abhijit090.github.io/QA_Automation_Pipeline/allure-report/${{ github.run_number }}/"
          echo ""
          echo "📦 Or download from Artifacts tab above."
          echo "============================================="

      - name: Fail pipeline if tests failed
        if: steps.robot_run.outcome == 'failure'
        run: |
          echo "❌ One or more Robot Framework tests FAILED."
          exit 1
